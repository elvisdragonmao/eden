<!doctype html>
<html lang="zh-Hant-TW">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>伊甸</title>
		<meta name="description" content="伊甸的一頁式個人網站，收錄介紹、委託資訊與圖集。" />
		<link rel="stylesheet" href="/src/style.css" />
	</head>
	<body>
		<div class="site-chrome" data-theme="light">
			<div class="desktop-frame" aria-hidden="true">
				<div class="desktop-nav">
					<a href="#about">About</a>
					<a href="#gallery">Gallery</a>
					<a href="#commission">Commission</a>
				</div>
				<div class="social-rail" aria-label="社群連結">
					<a href="https://www.facebook.com/" aria-label="Facebook">
						<span class="social-icon" style="--icon: url(&quot;/img/icon/facebook.svg&quot;)"></span>
					</a>
					<a href="https://x.com/" aria-label="X">
						<span class="social-icon" style="--icon: url(&quot;/img/icon/x.svg&quot;)"></span>
					</a>
					<a href="https://t.me/" aria-label="Telegram">
						<span class="social-icon" style="--icon: url(&quot;/img/icon/telegram.svg&quot;)"></span>
					</a>
				</div>
			</div>

			<button class="menu-toggle" type="button" aria-expanded="false">
				<span></span>
				<span></span>
				<span class="visually-hidden">開啟選單</span>
			</button>

			<nav class="mobile-drawer" aria-label="手機導覽">
				<a href="#cover">Cover</a>
				<a href="#about">About</a>
				<a href="#commission">Commission</a>
				<a href="#gallery">Gallery</a>
				<div class="drawer-socials">
					<a href="https://www.facebook.com/" aria-label="Facebook">
						<span class="social-icon" style="--icon: url(&quot;/img/icon/facebook.svg&quot;)"></span>
					</a>
					<a href="https://x.com/" aria-label="X">
						<span class="social-icon" style="--icon: url(&quot;/img/icon/x.svg&quot;)"></span>
					</a>
					<a href="https://t.me/" aria-label="Telegram">
						<span class="social-icon" style="--icon: url(&quot;/img/icon/telegram.svg&quot;)"></span>
					</a>
				</div>
			</nav>
		</div>

		<main id="content">
			<div class="story-scroll">
				<span class="story-anchor" id="cover" style="--anchor-top: 0svh"></span>
				<span class="story-anchor" id="about" style="--anchor-top: 140svh"></span>
				<span class="story-anchor" id="commission" style="--anchor-top: 235svh"></span>
				<span class="story-anchor" id="gallery" style="--anchor-top: 420svh"></span>

				<div class="story-stage">
					<section class="section cover-section" aria-label="伊甸封面" data-scene="cover">
						<div class="cover-scene">
							<div class="cover-bg" aria-hidden="true"></div>
							<h1 class="cover-title">伊甸</h1>
							<div class="cover-avatar" aria-hidden="true">
								<img class="cover-avatar-base" src="/img/cover-avatar.webp" alt="" decoding="async" />
								<img class="cover-avatar-color" src="/img/cover-avatar.webp" alt="" decoding="async" />
							</div>
							<a class="scroll-cue" href="#about" aria-label="往下捲動到關於區塊">
								<span class="scroll-arrow" aria-hidden="true"></span>
								<span>Scroll</span>
							</a>
						</div>
					</section>

					<section class="section about-section" aria-label="關於伊甸" data-scene="about">
						<div class="about-shell">
							<div class="about-rule about-rule-top" aria-hidden="true"></div>
							<div class="about-rule about-rule-bottom" aria-hidden="true"></div>

							<div class="about-title" data-reveal="about-title">
								<p>
									<span>這裡是伊甸</span>
									<small>，</small>
								</p>
								<p>
									<span>一條藍色</span>
									<small>的</small>
									<span>龍</span>
								</p>
							</div>

							<figure class="about-feier" data-reveal="soft">
								<img src="/img/feier.webp" alt="伊甸的小角色插圖" />
							</figure>

							<div class="about-copy about-copy-one" data-reveal="text">
								<p>喜歡寫程式、寫網頁、做設計、玩音樂</p>
							</div>
							<div class="about-copy about-copy-two" data-reveal="text">
								<p>夢想是希望透過科技</p>
								<p>讓世界有一點點不一樣</p>
							</div>

							<figure class="about-head masked-square" data-reveal="soft">
								<img src="/img/head.webp" alt="伊甸頭像" />
							</figure>

							<figure class="about-portrait masked-portrait" data-reveal="soft" aria-hidden="true">
								<img src="/img/cover-avatar.webp" alt="" />
							</figure>
						</div>
					</section>

					<section class="section commission-section" aria-label="委託資訊" data-scene="commission">
						<div class="commission-bg" aria-hidden="true"></div>
						<div class="commission-copy" data-reveal="text">
							<h2>我喜歡做酷東西</h2>
							<p>如果你有任何有趣的想法，</p>
							<p>也喜歡酷酷、高性能的網頁</p>
							<p>歡迎可以來找我！</p>
						</div>

						<div class="commission-flip" aria-hidden="true">
							<div class="flip-card">
								<div class="flip-face flip-front">
									<img src="/img/head.webp" alt="" />
								</div>
								<div class="flip-face flip-back">
									<div class="flip-back-preview">
										<span>Gallery</span>
										<img src="/img/me/yukiminoideyu.webp" alt="" />
										<img src="/img/me/orion.webp" alt="" />
									</div>
								</div>
							</div>
						</div>
					</section>

					<section class="section gallery-section" aria-label="圖集" data-scene="gallery">
						<div class="gallery-top-rule" aria-hidden="true"></div>
						<h2 data-reveal="text">圖集</h2>
						<p class="gallery-intro" data-reveal="text">
							<span>見到我歡迎跟我抱抱打招呼！</span>
							<span>請多多指教！</span>
						</p>

						<div class="gallery-marquee" data-gallery-marquee>
							<div class="gallery-track">
								<button class="gallery-card is-transition" type="button" data-full="/img/head.webp" data-caption="星光頭像" data-author="Eden" data-author-url="https://example.com/eden">
									<img src="/img/head.webp" alt="星光頭像" />
								</button>
								<button class="gallery-card" type="button" data-full="/img/cover-avatar.webp" data-caption="伸手打招呼的伊甸" data-author="Eden" data-author-url="https://example.com/eden">
									<img src="/img/cover-avatar.webp" alt="伸手打招呼的伊甸" />
								</button>
								<button class="gallery-card is-narrow" type="button" data-full="/img/feier.webp" data-caption="菲爾" data-author="Eden" data-author-url="https://example.com/eden">
									<img src="/img/feier.webp" alt="菲爾角色插圖" />
								</button>
								<button class="gallery-card" type="button" data-full="/img/me/yukiminoideyu.webp" data-caption="Yukiminoideyu" data-author="Eden" data-author-url="https://example.com/eden">
									<img src="/img/me/yukiminoideyu.webp" alt="Yukiminoideyu 插圖" />
								</button>
								<button class="gallery-card" type="button" data-full="/img/me/orion.webp" data-caption="Orion" data-author="Eden" data-author-url="https://example.com/eden">
									<img src="/img/me/orion.webp" alt="Orion 插圖" />
								</button>
								<button class="gallery-card is-wide" type="button" data-full="/img/commission-bg.webp" data-caption="酷東西背景" data-author="Eden" data-author-url="https://example.com/eden">
									<img src="/img/commission-bg.webp" alt="黃色與紫色星空背景" />
								</button>
							</div>
						</div>

						<p class="site-credit">
							Made with
							<span aria-hidden="true">💻</span>
							by Eden
						</p>
					</section>
				</div>
			</div>
		</main>

		<div class="lightbox" aria-hidden="true" role="dialog" aria-modal="true">
			<button class="lightbox-close" type="button" aria-label="關閉圖集檢視">
				<span></span>
				<span></span>
			</button>
			<div class="lightbox-stage">
				<img class="lightbox-image" alt="" />
			</div>
			<div class="lightbox-bar">
				<div class="lightbox-caption">
					<p></p>
					<a href="#" target="_blank" rel="noreferrer"></a>
				</div>
				<div class="lightbox-controls" aria-label="圖片縮放控制">
					<button type="button" data-zoom="out" aria-label="縮小">−</button>
					<button type="button" data-zoom="reset" aria-label="重設大小">1×</button>
					<button type="button" data-zoom="in" aria-label="放大">＋</button>
				</div>
			</div>
		</div>

		<script type="module" src="/src/main.js"></script>
	</body>
</html>
